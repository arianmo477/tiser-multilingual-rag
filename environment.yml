name: tiser
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Utilities
  - numpy=1.26.*
  - tqdm
  - protobuf>=3.20,<5
  - sentencepiece        # NLLB / Qwen tokenizers
  - sacremoses           # NLLB tokenizer
  - faiss-cpu            # RAG retrieval index

  - pip:
      # PyTorch
      - torch>=2.6

      # HF stack
      - transformers>=4.39.0
      - datasets>=2.16.1
      - accelerate>=0.27.0   # required at runtime for device_map="auto" / 4-bit
      - peft>=0.10.0
      - bitsandbytes         # 4-bit QLoRA (CUDA only)
      - tokenizers>=0.15.0

      # RAG retrieval
      - sentence-transformers>=2.5.0
